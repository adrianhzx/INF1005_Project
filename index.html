<!DOCTYPE html>
<html lang="en">

<head>
    <title>Ekea</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* --- GLOBAL STYLES --- */
        body {
            background-color: #fcfbf9;
            color: #333;
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
        }

        h1, h2, h3, .navbar-brand, .product-title {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.05em;
            color: #1a1a1a;
        }

        /* --- NAVIGATION --- */
        .navbar {
            background-color: #fcfbf9;
            padding: 1.5rem 0;
            border-bottom: 1px solid #eaeaea;
        }

        .navbar-brand {
            font-size: 1.8rem;
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
            display: block;
            margin-bottom: 1rem;
        }

        .navbar-nav {
            flex-direction: row;
            justify-content: center;
            width: 100%;
            gap: 2rem;
        }

        .nav-link {
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            color: #555 !important;
            padding: 0 !important;
        }

        @media (max-width: 991px) {
            .navbar-nav {
                flex-direction: column;
                gap: 1rem;
                padding-top: 1rem;
                text-align: center;
            }
        }

        /* --- HERO IMAGE --- */
        .hero-container {
            width: 100vw;
            margin: 0;
            padding: 0;
            display: block;
        }

        .hero-img {
            display: block;
            width: 100%;
            height: auto;
        }

        @media (min-width: 992px) {
            .hero-img {
                height: 85vh;
                object-fit: cover;
                object-position: center;
            }
        }

        /* --- PRODUCT SLIDER STYLES --- */
        .shop-section {
            padding: 5rem 0;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .product-card {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 0 10px; /* Gap between slides */
        }

        .product-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            margin-bottom: 1rem;
            background-color: #f0f0f0;
        }

        .product-info {
            text-align: center;
        }

        .product-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-family: 'Lato', sans-serif;
            color: #777;
            font-size: 0.9rem;
        }

        /* CAROUSEL CONTROLS (ARROWS) */
        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            background-color: #333; /* Dark arrows so you can see them on white bg */
            border-radius: 50%;
            padding: 20px;
        }
        
        .carousel-control-prev, .carousel-control-next {
            width: 5%; /* Make click area smaller so it doesn't cover products */
        }

    </style>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid flex-column">
                <a class="navbar-brand" href="#">Ekea</a>
                <button class="navbar-toggler mt-2" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navContent">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="#">New Arrivals</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Dining Tables</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Chairs</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Philosophy</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="hero-container">
        <img src="./assets/spacejoy-unsplash1.jpg" alt="Main Showcase" class="hero-img">
    </div>

    <main class="container shop-section">
        
        <div class="section-header">
            <h3>The Collection</h3>
            <p>Swipe to view more pieces.</p>
        </div>

        <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
            
            <div class="carousel-inner">
                
                <div class="carousel-item active">
                    <div class="row">
                        <div class="col-md-4">
                            <a href="#" class="product-card">
                                <img src="./assets/spacejoy-unsplash-row1.jpg" class="product-img" alt="Chair">
                                <div class="product-info">
                                    <h4 class="product-title">Conoid Chair</h4>
                                    <div class="product-price">$1,200</div>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4 d-none d-md-block">
                            <a href="#" class="product-card">
                                <img src="./assets/spacejoy-unsplash-row1.jpg" class="product-img" alt="Table">
                                <div class="product-info">
                                    <h4 class="product-title">Minguren Table</h4>
                                    <div class="product-price">$3,450</div>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4 d-none d-md-block">
                            <a href="#" class="product-card">
                                <img src="./assets/spacejoy-unsplash-row1.jpg" class="product-img" alt="Bench">
                                <div class="product-info">
                                    <h4 class="product-title">Frenchman's Bench</h4>
                                    <div class="product-price">$2,800</div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="row">
                        <div class="col-md-4">
                            <a href="#" class="product-card">
                                <img src="./assets/spacejoy-unsplash-row1.jpg" class="product-img" alt="Desk">
                                <div class="product-info">
                                    <h4 class="product-title">Conoid Desk</h4>
                                    <div class="product-price">$4,100</div>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4 d-none d-md-block">
                            <a href="#" class="product-card">
                                <img src="./assets/spacejoy-unsplash-row1.jpg" class="product-img" alt="Lamp">
                                <div class="product-info">
                                    <h4 class="product-title">Floor Lamp</h4>
                                    <div class="product-price">$850</div>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4 d-none d-md-block">
                            <a href="#" class="product-card">
                                <img src="./assets/spacejoy-unsplash-row1.jpg" class="product-img" alt="Stool">
                                <div class="product-info">
                                    <h4 class="product-title">Mira Stool</h4>
                                    <div class="product-price">$650</div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
        </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
